version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    restart: unless-stopped

  app:
    build: .
    container_name: springboot-app
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      # URL de conexión apuntando  'mongodb' definido arriba
      - SPRING_DATA_MONGODB_URI=mongodb://admin:password@mongodb:27017/prueba-personalSoft?authSource=admin
    restart: unless-stopped

volumes:
  mongodb_data:
